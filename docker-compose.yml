# Agent Hub V1 全栈(§10 第2步:脚手架 Compose)
# 一键起:db(pgvector) + redis + sandbox + backend
# 用法: docker compose up --build
services:
  # —— 数据层(§4.3)——
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
      POSTGRES_DB: agenthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # —— 沙箱(§3,数据面;agent 经 HTTP API 调用 §9 架构优化)——
  sandbox:
    image: ghcr.io/agent-infra/sandbox:latest
    ports:
      - "8080:8080"
    # 覆盖镜像内置 healthcheck:内置探针会查 browser 调试端口导致误报 unhealthy。
    # 只查核心 HTTP API(8080)即可判断 sandbox 是否可用。
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/sandbox || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    # 本轮:常驻单实例 sandbox;后续多实例时由控制面按会话起停

  # —— 后端(模块化单体,§2.2)——
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      # 容器间网络:覆盖 .env 里的 localhost 地址
      DATABASE_URL: postgresql+psycopg2://agenthub:agenthub@db:5432/agenthub
      REDIS_URL: redis://redis:6379/0
      SANDBOX_BASE_URL: http://sandbox:8080
      SANDBOX_IMAGE: ghcr.io/agent-infra/sandbox:latest
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      sandbox:
        condition: service_started

volumes:
  pgdata:
  redis-data:
