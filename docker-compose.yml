# Agent Hub V1 全栈(§10 第2步脚手架 + A2 会话级容器)
# 一键起:db(pgvector) + redis + backend(后端按需起会话级 sandbox 容器)
# 用法: docker compose up --build
#
# A2 变化:sandbox 不再是常驻 service,改为后端经 docker.sock 按会话起独立容器(1会话=1容器)。
# 后端需挂 docker.sock(单团队内网信任边界,报告 §6)。
services:
  # —— 数据层 ——
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
      POSTGRES_DB: agenthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # —— 后端(模块化单体,§2.2;A2:会话级容器控制面)——
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      # 容器间网络
      DATABASE_URL: postgresql+psycopg2://agenthub:agenthub@db:5432/agenthub
      REDIS_URL: redis://redis:6379/0
      SANDBOX_IMAGE: agent-hub-sandbox:latest  # 自定义镜像(预装 aerosandbox,避免 per-session 重装)
      # SANDBOX_BASE_URL 不再用(A2:每会话独立容器,运行时按容器名/端口解析)
    volumes:
      # A2:挂 docker.sock,后端经 docker-py 起停会话级容器
      # Windows Docker Desktop 用 //var/run/docker.sock(双斜杠)
      - //var/run/docker.sock:/var/run/docker.sock
      # skill 文件系统(后端读写 SKILL.md + scripts/,同步进会话容器)
      - ./backend/skills:/app/skills
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redis-data:
